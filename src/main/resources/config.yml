# Command names and aliases. Rename these if they clash with another plugin, or add
# aliases (e.g. despi-aliases: [di]). Names may use lowercase letters, digits, '_',
# '-', '.'; invalid names fall back to the defaults with a console warning.
# Changes take effect on SERVER RESTART — commands register once at startup, so
# /despi reload does NOT re-register them.
commands:
  despi: despi
  despi-aliases: []
  recycle: recycle
  recycle-aliases: []

# How many despawn locations a player may own (self-service limits).
limits:
  # Default cap when a player has no limit permission.
  default: 10

  # Set true to remove the cap entirely for everyone.
  unlimited: false

  # Per-group / per-rank caps are granted via permissions instead of listing them here:
  #   despi.limit.<number>   grants that number as the player's cap (highest wins)
  #   despi.limit.bypass     ignores the cap (default: op)
  # e.g. give a LuckPerms group the node  despi.limit.50  for a 50-location cap.

# Large-server safety limits for the automatic despawn-relocation pipeline. These bound
# how much work happens per tick so a flood of despawning items never storms the server.
#
# Tuning for busy servers: throughput = max-per-tick × 20 items/second (the pipeline is
# budget-bound, not implementation-bound — measured: a 5000-item burst fully lands in
# ~1.3× the theoretical minimum ticks, and raising max-per-tick scales proportionally).
# The per-relocation main-thread cost is small; max-per-tick 100 is comfortable on
# modern hardware if your players generate heavy despawn volume. Raise max-queue
# alongside it if bursts arrive faster than the drain.
performance:
  # New relocations started per server tick (20 ticks = 1 second).
  max-per-tick: 20

  # Maximum relocations processing at once.
  max-concurrent: 200

  # Maximum items waiting to be relocated.
  max-queue: 10000

  # When the queue is full: true = ignore new items, false = drop the oldest.
  drop-when-full: true

# Per-user throttling — how much of the server budget above any ONE player may take.
#
# The performance: section stops the SERVER being overwhelmed. This section stops a single
# PLAYER starving everyone else: without it, one person dumping a double chest of cobble
# can consume the whole pipeline while other players' items quietly expire.
#
# OFF BY DEFAULT — nothing here is consulted until enabled: true, so upgrading changes
# no behaviour.
throttle:
  enabled: false

  # Which policies apply:
  #   none        no per-user throttling (same as enabled: false)
  #   rate        max relocations per player per window          ("max per chunk of time")
  #   concurrent  max relocations in flight per player at once   ("max per each one")
  #   fair-share  weighted round-robin so nobody monopolises the drain
  #   combined    all three (recommended when throttling at all)
  strategy: combined

  rate:
    # Relocations a player may start per window before being throttled.
    max-per-window: 60
    window-seconds: 60

  concurrent:
    # Relocations a single player may have in flight simultaneously.
    max-per-player: 20

  fair-share:
    # Drain weight for players with no despi.throttle.weight.<n> permission.
    # A weight-3 player is drained three times as fast as a weight-1 player when the
    # pipeline is contended — this is how some users get more than others.
    default-weight: 1

  # Whether ownerless drops (mob loot, dispensers, block breaks) are throttled too.
  # Left false so a busy mob farm doesn't eat the budget players are meant to share.
  throttle-unowned: false

  # What happens to an item whose owner is over quota:
  #   defer  keep it queued and relocate it once their budget refills (default, lossless)
  #   drop   give up on it — it despawns as vanilla would
  #   void   hand it to the void / catch-all path below
  on-limit: defer

  # Per-rank allowances are granted via permissions rather than listed here:
  #   despi.throttle.rate.<n>        that many relocations per window (highest wins)
  #   despi.throttle.concurrent.<n>  that many in flight at once
  #   despi.throttle.weight.<n>      fair-share weight
  #   despi.throttle.bypass          ignore throttling entirely (default: op)
  # e.g. give a LuckPerms "vip" group  despi.throttle.weight.4  and  despi.throttle.rate.240

# The void: outright destruction, and the catch-all safety net.
#
# INERT BY DEFAULT — chance 0.0, no extra banned materials, catch-all disabled.
void:
  # Probability (0.0–1.0) that any given despawning item is voided instead of relocated.
  # 0.0 disables the roll entirely. 0.05 voids roughly one item in twenty — a light sink
  # for servers that want despawn recovery without it being a perfect safety net.
  chance: 0.0

  # Extra materials always treated as contraband, on top of the built-in list (command
  # blocks, debug sticks, structure blocks, netherite…). Unknown names are warned about
  # and skipped rather than failing the load.
  # e.g. banned-materials: [BEDROCK, BARRIER, SPAWNER]
  banned-materials: []

  # One or more containers that receive banned items and items lost to the void roll,
  # instead of them ceasing to exist. Useful for auditing what players are dropping,
  # for staff to hand things back, or as a server-wide "lost and found".
  catch-all:
    enabled: false

    # first  — fill the listed containers in order
    # random — spread across them (avoids always filling the first)
    mode: first

    # Block positions as  world;x;y;z  — each should be a chest, barrel, shulker box or
    # any other container. Malformed or non-container entries are warned about and skipped.
    # e.g. locations: ["world;100;64;200", "world;101;64;200"]
    locations: []

    # When every catch-all is full: true = destroy the item, false = let it fall through
    # to ordinary relocation.
    destroy-when-full: true

# Where despawn locations are stored.
storage:
  # yaml  — flat files under userdata/ (default, zero setup, fine for most servers)
  # sqlite — an embedded database file (good for large single servers)
  # mysql  — a MySQL/MariaDB server (share storage across a network of servers)
  # Switching backends automatically migrates existing data on first start.
  type: yaml

  # Only used when type is mysql.
  mysql:
    host: localhost
    port: 3306
    database: despawneditems
    username: root
    password: ""
    # Extra JDBC url parameters, joined with '&'.
    properties: "useSSL=false&allowPublicKeyRetrieval=true"

  # Connection pool sizing (sqlite is forced to 1 writer regardless).
  pool:
    maximum-pool-size: 10

# Sound emitted once when a new item is added to a despawn container.
sound:
  # Whether the sound is played at all.
  enabled: true

  # Sound to play, as a Minecraft sound key (namespaced or plain).
  # See https://minecraft.wiki/w/Sounds.json for the full list, e.g.
  # block.fire.extinguish, block.note_block.pling, entity.item.pickup
  sound: block.fire.extinguish

  # Volume (>= 0). Also affects how far the sound carries.
  volume: 1.0

  # Pitch, 0.5 (low) to 2.0 (high).
  pitch: 1.0

# Particles emitted when a new item is added to a despawn container.
particles:
  # Whether particles are shown at all.
  enabled: true

  # Particle to use, as a Minecraft particle key (namespaced or plain).
  # See https://minecraft.wiki/w/Particles for the full list, e.g.
  # happy_villager, cloud, crit
  # Particles that need data this plugin doesn't model fall back to happy_villager
  # with a console warning (rather than erroring).
  particle: happy_villager

  # Colour for DUST-type particles only (#RRGGBB); ignored by other particles.
  color: '#FFC800'

  # Size multiplier for DUST-type particles, 0.01–4.0.
  dust-size: 1.0

  # How long, in seconds, particles keep emitting on the container.
  length-seconds: 3

  # How often particles are emitted, in ticks (20 ticks = 1 second).
  # Clamped between 1 and 20.
  new-every-nth-tick: 2

  # How many particles are emitted each time.
  count-every-nth-tick: 15

  # Random spread radius of the particles. 0.5 is a good default.
  radius: 0.5
