name: papermc-despawned-items
version: '${version}'
main: com.popupmc.despawneditems.PaperMcDespawnedItems
description: Relocates despawning ground items into nearby containers, cookers, entities, or empty space instead of deleting them.
author: Fairy Fox
website: https://github.com/1fairyfox/papermc-despawned-items
api-version: '1.21'

# Runtime libraries downloaded by Paper's library loader (kept out of the jar).
# HikariCP is the pool; the JDBC drivers back the sqlite/mysql storage backends.
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.49.1.0
  - org.mariadb.jdbc:mariadb-java-client:3.5.3

# Commands (/despi, /recycle) are registered in code via Paper's Brigadier command API
# (see DespiCommand.kt), not declared here.

permissions:
  despi.use:
    description: Allows use of the /despi command
    default: true
  despi.elevated:
    description: Allows managing despawn locations owned by others and admin/test subcommands
    default: op
  despi.limit.bypass:
    description: Ignore the per-user despawn-location limit (also grant despi.limit.<number> for a specific cap)
    default: op
  recycle.use:
    description: Allows use of the /recycle command
    default: true
