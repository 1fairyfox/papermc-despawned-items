# Detekt layered on top of the default rule set (buildUponDefaultConfig = true).
#
# No rule is disabled. The overrides below are either (a) alignment with ktlint
# (MaxLineLength = 140) or (b) sane thresholds for patterns this plugin uses everywhere
# — guard-clause early returns and cohesive facade classes — with the egregious cases
# still flagged and handled by a narrowly-scoped `@Suppress` + reason at the site.
# MagicNumber stays ON: numbers were extracted to named constants (whose *declaration*
# is what ignorePropertyDeclaration permits — uses of a bare literal are still caught).

style:
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    # Guard-clause early returns are the idiomatic style in the despawn strategies;
    # detekt's default of 2 is unusually strict. Methods still over this are @Suppressed
    # individually with a reason.
    max: 6
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreNamedArgument: true

complexity:
  TooManyFunctions:
    # LocationManager / DespiActions etc. are deliberately broad, cohesive facades — not
    # god classes; the default of 11 is too low for an API surface.
    thresholdInClasses: 45
    thresholdInObjects: 45
