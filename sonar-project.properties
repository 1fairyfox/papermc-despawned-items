# SonarQube Cloud (formerly SonarCloud) analysis config — bugs, code smells, duplication,
# maintainability / tech-debt, and (CI-scan only) coverage import. Free for public repositories.
# Backs the README "quality gate" and "tech debt" badges.
#
# HOW THIS RUNS. Two supported paths — pick one on the SonarCloud project's Administration →
# Analysis Method page:
#   1. Automatic Analysis (simplest): SonarCloud clones + scans on every push. No CI step, no
#      SONAR_TOKEN, no scanner action to SHA-pin. Gives the quality-gate + tech-debt badges.
#      Caveat: Automatic Analysis does NOT import external coverage, so the coverage line below is
#      inert under it — coverage lives on the Codecov badge instead (ci.yml uploads Kover there).
#   2. CI-based scan (if you want coverage INSIDE Sonar too): add a token-guarded
#      `SonarSource/sonarqube-scan-action` step to ci.yml after `koverXmlReport`, set the
#      `SONAR_TOKEN` secret, and disable Automatic Analysis (the two are mutually exclusive).
#
# KEYS — confirm before trusting. SonarCloud mints its OWN projectKey/organization when the project
# is first imported; they do not always match the GitHub slug/owner. The values below are the
# convention for a fresh import under the `1fairyfox` org. After importing, open the project's
# Information page and correct these (and the badge URLs in README.md) if SonarCloud shows anything
# different — then confirm one scan passes.
# Verified against the live project 2026-07-21 (api/components/show): SonarCloud minted
# the org key from the owner account (junebug12851), not the GitHub org slug.
sonar.projectKey=1fairyfox_papermc-despawned-items
sonar.organization=junebug12851
sonar.projectName=papermc-despawned-items

# ---------------------------------------------------------------------------------------------------
# SCOPE: the plugin source (`src/main`) — the despawn pipeline, storage backends, indexed location
# store, limits, and commands. That is the substantive logic a quality / tech-debt gate is for.
# ---------------------------------------------------------------------------------------------------
sonar.sources=src/main
sonar.tests=src/test

# Coverage import (CI-based scan only — see path #2 above). Kover's XML report is JaCoCo-format,
# which Sonar reads via this property. Generated by `./gradlew koverXmlReport`.
sonar.coverage.jacoco.xmlReportPaths=build/reports/kover/report.xml

# Keep generated/build output and the test tree out of the coverage denominator and duplication
# detector; tests are analysed for test-smells but not counted as covered/uncovered product code.
sonar.coverage.exclusions=**/*Test.kt,src/test/**
sonar.cpd.exclusions=src/test/**

sonar.sourceEncoding=UTF-8
