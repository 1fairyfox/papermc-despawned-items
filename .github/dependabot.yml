# Dependabot — keep dependencies and GitHub Actions current.
# See notes/reference/supply-chain-hardening.md. Targets the WORKING branch (dev)
# so update PRs match the mesh's git-flow instead of piling onto main.

version: 2
updates:
  # Gradle dependencies (Paper API, Kotlin, plugins).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  # GitHub Actions — keeps SHA-pinned Actions current so the OpenSSF Scorecard
  # Pinned-Dependencies check stays green without going stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    labels: ["dependencies", "github-actions"]
