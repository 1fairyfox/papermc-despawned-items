name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      # Proves the checked-in gradle-wrapper.jar is an official Gradle release — the
      # accepted mitigation for Scorecard's Binary-Artifacts finding on wrapper jars.
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Doc link gate (repo-hygiene standard)
        run: node scripts/check-links.mjs
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
      # Emit the Kover coverage report as XML for Codecov (Kover already gates the build
      # locally; the test results from `build` are reused, so this is near-instant).
      - name: Kover XML coverage report
        run: ./gradlew koverXmlReport --no-daemon
      # Non-blocking: publish coverage to Codecov (the badge + PR annotations). Public repos
      # work tokenless; CODECOV_TOKEN is recommended. Kover's XML is Codecov-native.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: 1fairyfox/papermc-despawned-items
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
      - name: Upload plugin jar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: papermc-despawned-items-jar
          path: build/libs/papermc-despawned-items-*.jar
          if-no-files-found: error
