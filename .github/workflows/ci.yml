name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Job-level so the Sonar step's `if:` can test it (step-level env is invisible
      # to the step's own condition).
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      # Proves the checked-in gradle-wrapper.jar is an official Gradle release — the
      # accepted mitigation for Scorecard's Binary-Artifacts finding on wrapper jars.
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Doc link gate (repo-hygiene standard)
        run: node scripts/check-links.mjs
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
      # Emit the Kover coverage report as XML for Codecov (Kover already gates the build
      # locally; the test results from `build` are reused, so this is near-instant).
      - name: Kover XML coverage report
        run: ./gradlew koverXmlReport --no-daemon
      # Non-blocking: publish coverage to Codecov (the badge + PR annotations). Public repos
      # work tokenless; CODECOV_TOKEN is recommended. Kover's XML is Codecov-native.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: 1fairyfox/papermc-despawned-items
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
      # SonarQube Cloud CI-based scan (reads sonar-project.properties; imports the Kover
      # XML as coverage). Requires SONAR_TOKEN and Automatic Analysis DISABLED on the
      # SonarCloud project (the two are mutually exclusive). Skips itself if the token
      # is absent, so forks and tokenless clones stay green.
      - name: SonarQube Cloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      - name: Upload plugin jar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: papermc-despawned-items-jar
          path: build/libs/papermc-despawned-items-*.jar
          if-no-files-found: error

  # Real-server smoke (testing.md §19–22): boot an actual Paper server with the built
  # jar on the target version AND the newest major (forward-compat), assert a clean
  # enable. MockBukkit proves the code against the mocked API; this proves the mock's
  # assumptions against the real one.
  server-smoke:
    name: Server smoke (Paper ${{ matrix.mc }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21.11" # the build target
            java: "21"
          - mc: "26.1.2" # forward-compat check
            java: "25"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: papermc-despawned-items-jar
      - name: Boot Paper ${{ matrix.mc }} with the plugin
        run: bash scripts/server-smoke.sh "${{ matrix.mc }}" "papermc-despawned-items-*.jar"

  # In-game client acceptance (testing.md §83–87): a Mineflayer bot — a real Minecraft
  # client on the wire — joins the server and runs plugin commands; asserts the replies
  # reach the client. End-to-end: Kotlin → Paper → protocol → client.
  ingame-smoke:
    name: In-game client smoke (Mineflayer)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: papermc-despawned-items-jar
      - name: Prepare the server directory
        run: |
          mkdir -p smoke-ingame/plugins
          URL="$(curl -fsSL "https://fill.papermc.io/v3/projects/paper/versions/1.21.11/builds/latest" | jq -r '.downloads["server:default"].url')"
          curl -fsSL -o smoke-ingame/paper.jar "$URL"
          cp papermc-despawned-items-*.jar smoke-ingame/plugins/
      - name: Install Mineflayer
        run: npm install --no-save --no-package-lock mineflayer
      - name: Join with a bot and run plugin commands
        run: node scripts/ingame-smoke.mjs smoke-ingame
