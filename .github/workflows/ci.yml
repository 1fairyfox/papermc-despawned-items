name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Job-level so the Sonar step's `if:` can test it (step-level env is invisible
      # to the step's own condition).
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      # Proves the checked-in gradle-wrapper.jar is an official Gradle release — the
      # accepted mitigation for Scorecard's Binary-Artifacts finding on wrapper jars.
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Doc link gate (repo-hygiene standard)
        run: node scripts/check-links.mjs
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
      # Emit the Kover coverage report as XML for Codecov (Kover already gates the build
      # locally; the test results from `build` are reused, so this is near-instant).
      - name: Kover XML coverage report
        run: ./gradlew koverXmlReport --no-daemon
      # Non-blocking: publish coverage to Codecov (the badge + PR annotations). Public repos
      # work tokenless; CODECOV_TOKEN is recommended. Kover's XML is Codecov-native.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: 1fairyfox/papermc-despawned-items
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
      # SonarQube Cloud CI-based scan (reads sonar-project.properties; imports the Kover
      # XML as coverage). Requires SONAR_TOKEN and Automatic Analysis DISABLED on the
      # SonarCloud project (the two are mutually exclusive). Skips itself if the token
      # is absent, so forks and tokenless clones stay green.
      - name: SonarQube Cloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      - name: Upload plugin jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: papermc-despawned-items-jar
          path: build/libs/papermc-despawned-items-*.jar
          if-no-files-found: error

  # Real-server smoke (testing.md §19–22): boot an actual Paper server with the built
  # jar on the target version AND the newest major (forward-compat), assert a clean
  # enable. MockBukkit proves the code against the mocked API; this proves the mock's
  # assumptions against the real one.
  server-smoke:
    name: Server smoke (Paper ${{ matrix.mc }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21.11" # the build target
            java: "21"
          - mc: "26.1.2" # forward-compat check
            java: "25"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: papermc-despawned-items-jar
      - name: Boot Paper ${{ matrix.mc }} with the plugin
        run: bash scripts/server-smoke.sh "${{ matrix.mc }}" "papermc-despawned-items-*.jar"

  # Rolling-channel smoke: prove the plugin still loads on Paper's newest STABLE release
  # (a real signal — a red run here is investigated before shipping, per the ship-contract)
  # and, softly, on the newest EXPERIMENTAL dev build (continue-on-error — dev builds are
  # expected to be flaky, so surface issues without blocking). Both resolve their version
  # live from fill.papermc.io. Deliberately NOT added to `main`'s required status checks: a
  # moving external target shouldn't hard-block an otherwise-good release. Full in-game
  # (Mineflayer) functional coverage stays pinned to 1.21.11 — node-minecraft-protocol tops
  # out there and cannot join 26.x servers, so these rolling jobs are load/enable smokes.
  latest-paper:
    name: Latest Paper smoke (stable + experimental)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25" # newest stable + experimental Paper are on the 26.x line (Java 25)
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: papermc-despawned-items-jar
      - name: Latest STABLE Paper — load smoke (hard)
        run: bash scripts/server-smoke.sh latest-stable "papermc-despawned-items-*.jar"
      - name: Latest EXPERIMENTAL Paper — load smoke (soft; investigate, don't block)
        continue-on-error: true
        run: bash scripts/server-smoke.sh latest-experimental "papermc-despawned-items-*.jar"

  # In-game client acceptance (testing.md §83–87): a Mineflayer bot — a real Minecraft
  # client on the wire — joins the server and runs plugin commands; asserts the replies
  # reach the client. End-to-end: Kotlin → Paper → protocol → client.
  ingame-smoke:
    name: In-game client smoke (Mineflayer)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: papermc-despawned-items-jar
      - name: Prepare the server directory
        run: |
          mkdir -p smoke-ingame/plugins
          URL="$(curl -fsSL "https://fill.papermc.io/v3/projects/paper/versions/1.21.11/builds/latest" | jq -r '.downloads["server:default"].url')"
          curl -fsSL -o smoke-ingame/paper.jar "$URL"
          cp papermc-despawned-items-*.jar smoke-ingame/plugins/
      - name: Install Mineflayer
        # `npm ci` installs the exact tree from the committed package-lock.json
        # (integrity-hash pinned), satisfying Scorecard's Pinned-Dependencies check.
        run: npm ci
      - name: Join with a bot - permissions, gameplay, load and spark profiling
        run: node scripts/ingame-smoke.mjs smoke-ingame
      # The server ran under Java Flight Recorder; summarize and keep the profile so
      # every CI run carries downloadable real-server profiling data.
      - name: JFR summary
        if: always()
        run: |
          if [ -f smoke-ingame/profile.jfr ]; then
            jfr summary smoke-ingame/profile.jfr | head -40
          else
            echo "no JFR profile produced"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: server-jfr-profile
          path: smoke-ingame/profile.jfr
          if-no-files-found: warn
