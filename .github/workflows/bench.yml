name: Benchmarks

# JMH microbenchmarks — informational performance record, never a gate. Weekly + on
# demand; results (JSON) are uploaded as an artifact so regressions show as trends.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  jmh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Run JMH benchmarks
        run: ./gradlew jmh --no-daemon --stacktrace
      - name: Show results
        run: cat build/results/jmh/results.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jmh-results
          path: build/results/jmh/
          if-no-files-found: error

  # Mutation testing on the pure core (Pitest) — verifies the tests would notice
  # seeded bugs. Informational: strength trends live in the uploaded report.
  pitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Run Pitest
        run: ./gradlew pitest --no-daemon --stacktrace
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pitest-report
          path: build/reports/pitest/
          if-no-files-found: error
