name: Docs

# Builds the Dokka API docs and publishes them to GitHub Pages on every release to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level (Scorecard Token-Permissions); the deploy job below
# elevates only the pages/id-token scopes it needs.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Capture the gallery that /screenshots.html renders. Non-blocking: if a renderer hiccups
  # the docs still publish, and the page degrades honestly to "no frames published yet".
  screenshots:
    uses: ./.github/workflows/screenshots.yml
    with:
      engine: viewer

  build-and-deploy:
    needs: screenshots
    if: always() # publish the docs even if the capture job failed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build the docs site (chrome pages + boundaried Dokka under /api/)
        run: ./gradlew assembleDocsSite --no-daemon --stacktrace
      # Weave the freshly captured frames into the site so README/docs image URLs
      # (…/screenshots/<name>.png) always resolve to the current build's screenshots —
      # the "README references up-to-date images automatically" requirement.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: release-screenshots
          path: build/docs-site/screenshots
      - name: Report the published gallery
        run: |
          if [ -f build/docs-site/screenshots/manifest.json ]; then
            echo "Publishing $(jq '.scenes | length' build/docs-site/screenshots/manifest.json) screenshot(s)."
          else
            echo "No screenshots artifact — the gallery page will say so rather than showing stale art."
          fi
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/docs-site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
