name: CodeQL

# GitHub's native SAST — scans the Kotlin/Java for security issues. Findings land in the
# repo's Security → Code scanning tab. Free for public repositories.
#
# BUILD MODE: `manual` (traced Gradle compile) — the most precise mode. This works
# because the project holds Kotlin at 2.4.0: CodeQL 2.26.0 (2026-07-10) supports Kotlin
# up to 2.4.0 and rejects newer compilers ("Kotlin version 2.4.10 is too recent"), which
# is why this workflow was briefly dropped. Runs on dev pushes too, so an extractor
# regression is caught before it can gate a release PR.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-and-quality

      - name: Build for the traced compile
        # --rerun-tasks + --no-build-cache: the tracer only sees code that actually
        # compiles in THIS process; a cache-hit/up-to-date compile traces nothing and
        # finalize dies with "could not process any code" (bitten 2026-07-21).
        run: ./gradlew compileKotlin --rerun-tasks --no-build-cache --no-daemon --stacktrace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:java-kotlin"
