name: CodeQL

# GitHub's native SAST — scans the Kotlin/Java for security issues. Findings land in the repo's
# Security → Code scanning tab. Free for public repositories.
#
# Kotlin is analysed by the `java-kotlin` extractor, which is COMPILED — so unlike the JS sibling
# this needs a build. build-mode `manual`: we run the Gradle compile ourselves between init and
# analyze (autobuild also works, but an explicit compile with the pinned JDK is deterministic).
#
# RELEASE-GATED, like the sibling project: the release PR into `main` and pushes to `main`, plus a
# WEEKLY scan (a scan that only runs when you ship lets a newly-published query sit undiscovered
# until the next release; the schedule costs nothing and closes that hole).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job below elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-and-quality

      # Compile only (no tests) — enough for the java-kotlin extractor to trace the code.
      - name: Compile (Gradle)
        run: ./gradlew assemble --no-daemon --stacktrace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:java-kotlin"
