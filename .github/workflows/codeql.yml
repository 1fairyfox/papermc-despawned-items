name: CodeQL

# GitHub's native SAST — scans the Kotlin/Java for security issues. Findings land in the repo's
# Security → Code scanning tab. Free for public repositories.
#
# BUILD MODE: `none` (source extraction, no compile), deliberately — NOT autobuild/manual.
# CodeQL's Kotlin extractor trails the Kotlin release train: CodeQL 2.26.x rejects this project's
# Kotlin (2.4.10) during a *traced compile* with
#   `KotlinInterceptor$KotlinVersionTooRecentError: Kotlin version 2.4.10 is too recent`
# so a compiled build mode can't work until CodeQL catches up. `build-mode: none` reads the sources
# directly (no compiler interception, no Gradle step), which sidesteps that wall and still analyses
# the code. Revisit to autobuild/manual once CodeQL supports Kotlin 2.4.x (then a compile would let
# it resolve cross-file types more precisely).
#
# RELEASE-GATED, like the sibling project: the release PR into `main` and pushes to `main`, plus a
# WEEKLY scan so a newly-published query doesn't sit undiscovered between releases.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job below elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: java-kotlin
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:java-kotlin"
