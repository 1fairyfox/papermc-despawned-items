# release — build the plugin and attach it to the GitHub Release on a version tag.
#
# This workflow does NOT create the tag; it reacts to a hand-pushed `vX.Y.Z` tag
# (the git-flow release path in notes/reference/git-workflow.md). So the by-hand
# `git tag` step in a release is correct — CI does not own tagging here.

name: release

on:
  push:
    tags: ["v*"]

# Least privilege at the top level (Scorecard Token-Permissions); the release job
# elevates contents/id-token/attestations at job scope.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # id-token + attestations at JOB scope — required by the build-provenance
    # attestation step (supply-chain-hardening standard §4, Signed-Releases).
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: build/libs/papermc-despawned-items-*.jar
      # Also ship the provenance bundle AS a release asset (a `.intoto.jsonl` file):
      # OpenSSF Scorecard's Signed-Releases check scans release assets for provenance,
      # and does not query the attestations API — so the attestation above alone was
      # invisible to it. This makes provenance detectable and raises Signed-Releases.
      - name: Stage provenance as a release asset
        run: cp "${{ steps.attest.outputs.bundle-path }}" papermc-despawned-items-provenance.intoto.jsonl

      # ── The artifact bundle ────────────────────────────────────────────────────
      # A release should carry more than one jar: the API docs people actually read, the
      # exact source that produced the binary, the default config an admin wants before
      # installing, and checksums so any of it can be verified independently.
      - name: Build the API docs
        run: ./gradlew dokkaGenerate --no-daemon
      - name: Assemble the bundle
        id: bundle
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          mkdir -p bundle
          cp build/libs/papermc-despawned-items-*.jar bundle/
          cp papermc-despawned-items-provenance.intoto.jsonl bundle/
          cp src/main/resources/config.yml "bundle/config.default-${VERSION}.yml"
          cp LICENSE bundle/LICENSE.txt
          (cd build/dokka && zip -qr "$GITHUB_WORKSPACE/bundle/papermc-despawned-items-${VERSION}-apidocs.zip" html)
          git archive --format=zip --prefix="papermc-despawned-items-${VERSION}/" \
            -o "bundle/papermc-despawned-items-${VERSION}-sources.zip" HEAD
          # Checksums LAST, over everything else in the bundle.
          (cd bundle && sha256sum ./* > SHA256SUMS.txt)
          ls -la bundle

      # Screenshots ride along when a capture exists for this commit; never a blocker.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: release-screenshots
          path: screenshots
      - name: Add screenshots to the bundle (if any)
        continue-on-error: true
        run: |
          if [ -d screenshots ] && [ -n "$(ls -A screenshots 2>/dev/null)" ]; then
            zip -qr "bundle/papermc-despawned-items-$(cat VERSION)-screenshots.zip" screenshots
            (cd bundle && sha256sum ./* > SHA256SUMS.txt)
          fi

      - name: Attach the bundle to the GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: bundle/*
          generate_release_notes: true

  # ── Multi-platform publishing ────────────────────────────────────────────────────
  # The plugin jar is a Paper/Bukkit-family artifact: it runs unmodified on Paper, Purpur
  # and other Paper forks, and on Spigot/Bukkit within the declared API level. Each step
  # below skips itself when its token secret is absent, so this workflow stays green on a
  # fork or before the owner has created the project on that platform.
  #
  # Platform coverage and the roadmap for the loaders that need a *separate implementation*
  # (Folia, Fabric, NeoForge, Sponge, Velocity …) live in notes/plans/platform-targets.md.
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build the jar
        run: ./gradlew shadowJar --no-daemon

      # Modrinth + CurseForge in one step. `loaders` is the set of server platforms this
      # single jar genuinely runs on — Paper-family only. Fabric/NeoForge are deliberately
      # NOT listed: they would need a separate implementation, and claiming them here would
      # be a lie that ends in bug reports.
      - name: Publish to Modrinth and CurseForge
        if: env.MODRINTH_TOKEN != '' || env.CURSEFORGE_TOKEN != ''
        # Repo moved from Kir-Antipov/mc-publish to Kira-NT/mc-publish; SHA read from the
        # live v3.3 tag on the new canonical repo (2026-07-22).
        uses: Kira-NT/mc-publish@52307b03863581dec6b652b83e597aec02ebb075 # v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/papermc-despawned-items-*.jar
          name: PaperMC Despawned Items ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          loaders: |
            paper
            purpur
            spigot
            bukkit
          game-versions: |
            1.21.x
          java: |
            21
          changelog-file: notes/version/*.md

      # Hangar is PaperMC's own repository and needs its own publisher. Gated on the token
      # AND still requires io.papermc.hangar-publish-plugin to be applied in
      # build.gradle.kts — see notes/plans/platform-targets.md for the owner-side steps
      # (create the Hangar project, mint HANGAR_API_TOKEN, apply the plugin).
      - name: Publish to Hangar
        if: env.HANGAR_API_TOKEN != ''
        run: ./gradlew publishPluginPublicationToHangar --no-daemon
