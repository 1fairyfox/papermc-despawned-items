# release — build the plugin and attach it to the GitHub Release on a version tag.
#
# This workflow does NOT create the tag; it reacts to a hand-pushed `vX.Y.Z` tag
# (the git-flow release path in notes/reference/git-workflow.md). So the by-hand
# `git tag` step in a release is correct — CI does not own tagging here.

name: release

on:
  push:
    tags: ["v*"]

# Least privilege at the top level (Scorecard Token-Permissions); the release job
# elevates contents/id-token/attestations at job scope.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # id-token + attestations at JOB scope — required by the build-provenance
    # attestation step (supply-chain-hardening standard §4, Signed-Releases).
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: build/libs/papermc-despawned-items-*.jar
      - name: Attach jar to the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: build/libs/papermc-despawned-items-*.jar
          generate_release_notes: true

      # ── Optional: publish to Hangar (PaperMC's plugin repository) ──────────────
      # Requires a Hangar project and a HANGAR_API_TOKEN repo secret, plus the
      # Hangar Gradle publishing plugin wired into build.gradle.kts. Uncomment
      # once those exist. See https://docs.papermc.io/misc/hangar-publishing/
      #
      # - name: Publish to Hangar
      #   env:
      #     HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
      #   run: ./gradlew publishPluginPublicationToHangar --no-daemon
